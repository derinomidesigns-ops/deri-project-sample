  <style>



    body {

      font-family: Arial, sans-serif;

      background: #f5f5f5;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

    }



    .login-box {

      background: white;

      padding: 30px;

      border-radius: 10px;

      width: 300px;

      box-shadow: 0 0 10px rgba(0,0,0,0.1);

    }



    input {

      width: 100%;

      padding: 10px;

      margin-top: 10px;

      box-sizing: border-box;

    }



    button {

      width: 100%;

      padding: 10px;

      margin-top: 15px;

      cursor: pointer;

    }



  </style>

</head>



<body>



  <div class="login-box">



    <h2>Login</h2>



    <input

      type="email"

      id="email"

      placeholder="Email">



    <input

      type="password"

      id="password"

      placeholder="Password">



    <button onclick="login()">

    </button>



  </div>
