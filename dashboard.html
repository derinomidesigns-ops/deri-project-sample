<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
</head>

<body>

<h1 id="welcome"></h1>

<button onclick="logout()">
  Logout
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-k7wE7JqSNfqFOL7MLltLNUrb7hVX4CU",
  authDomain: "deri-project.firebaseapp.com",
  projectId: "deri-project",
  storageBucket: "deri-project.firebasestorage.app",
  messagingSenderId: "126232357966",
  appId: "1:126232357966:web:d1304b0d514e8336c3271f"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {

  if (!user) {

    window.location.href = "login.html";

  } else {

    document.getElementById("welcome")
      .innerText =
      `Welcome ${user.email}`;
  }
});

window.logout = async function () {

  await signOut(auth);

  window.location.href = "login.html";
};

</script>

</body>
</html>
